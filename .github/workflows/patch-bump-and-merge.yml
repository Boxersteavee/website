name: Bump Patch and Create PR

on:
  workflow_dispatch: # Manually trigger this workflow

jobs:
  bump-and-create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write # To commit and push the version bump
      pull-requests: write # To create the pull request
    steps:
      - name: Checkout dependabot branch
        uses: actions/checkout@v4
        with:
          ref: dependabot # Checkout the dependabot branch
          fetch-depth: 0 # Fetch full history for npm version
          token: ${{ secrets.GITHUB_TOKEN }} # Required for pushing changes

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set Git user
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Bump patch version
        run: npm version patch # Always bump the patch version when triggered

      - name: Get new version
        id: get_version
        run: echo "new_version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Validate build
        run: npm run build
        continue-on-error: false

      - name: Commit and push version bump
        run: |
          git add package.json package-lock.json
          # Check if there are staged changes (from npm version patch) before committing
          git diff --staged --quiet || git commit -m "chore: bump patch version to ${{ steps.get_version.outputs.new_version }}"
          git push origin dependabot

      - name: Create Pull Request to master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create PR from dependabot to master branch
          if gh pr create \
            --base master \
            --head dependabot \
            --title "Merge Dependabot updates - Version ${{ steps.get_version.outputs.new_version }}" \
            --body "This PR contains combined Dependabot updates and a patch version bump to ${{ steps.get_version.outputs.new_version }}." \
            --draft=false; then
            echo "✓ Pull request created successfully"
          else
            # Check if PR already exists
            if gh pr list --head dependabot --base master --state open --json number --jq 'length > 0'; then
              echo "ℹ Pull request already exists for this branch"
            else
              echo "⚠ Failed to create pull request"
              exit 1
            fi
          fi
