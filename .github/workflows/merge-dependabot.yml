name: Merge Dependabot PRs

on:
  pull_request_target:
    types: [opened, synchronize]
    branches:
      - dependabot
  workflow_dispatch:

jobs:
  merge-dependabot-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # Only run for Dependabot PRs or manual triggers
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.actor == 'dependabot[bot]'
    steps:
      - name: Checkout dependabot branch
        uses: actions/checkout@v4
        with:
          ref: dependabot
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set Git user
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Validate build (manual triggers only)
        if: github.event_name == 'workflow_dispatch'
        run: npm run build
        continue-on-error: false

      - name: Merge Dependabot PR (on PR event)
        if: github.event_name == 'pull_request_target' && github.actor == 'dependabot[bot]'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "Merging Dependabot PR #${PR_NUMBER}..."
          
          # Fetch the PR branch
          git fetch origin pull/${PR_NUMBER}/head:dependabot-pr
          
          # Merge the PR
          if git merge --no-ff dependabot-pr -m "Merge Dependabot PR #${PR_NUMBER}: ${PR_TITLE}"; then
            echo "✓ Successfully merged PR #${PR_NUMBER}"
            git push origin dependabot
            
            # Close the PR
            gh pr close ${PR_NUMBER}
            echo "✓ Closed PR #${PR_NUMBER}"
          else
            echo "✗ Failed to merge PR #${PR_NUMBER}"
            exit 1
          fi
          
          # Clean up the local branch
          git branch -d dependabot-pr || true

      - name: Merge all open Dependabot PRs (on manual trigger)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching all open Dependabot PRs..."
          
          # Use a temporary file to store PR data to avoid subshell issues
          TEMP_FILE=$(mktemp)
          gh pr list --state open --base dependabot --author dependabot[bot] --json number,headRefName,title -q '.[] | "\(.number)|\(.headRefName)|\(.title)"' > "$TEMP_FILE"
          
          # Check if there are any PRs
          if [ ! -s "$TEMP_FILE" ]; then
            echo "No open Dependabot PRs found."
            rm -f "$TEMP_FILE"
            exit 0
          fi
          
          PR_COUNT=$(wc -l < "$TEMP_FILE")
          echo "Found ${PR_COUNT} open Dependabot PR(s)"
          
          MERGE_FAILURES=0
          MERGE_SUCCESS=0
          
          # Process each PR
          while IFS='|' read -r PR_NUMBER HEAD_REF PR_TITLE; do
            [ -z "$PR_NUMBER" ] && continue
            
            echo ""
            echo "Processing PR #${PR_NUMBER}: ${PR_TITLE}"
            
            # Fetch the PR branch
            if ! git fetch origin pull/${PR_NUMBER}/head:${HEAD_REF} 2>/dev/null; then
              echo "✗ Failed to fetch PR #${PR_NUMBER}. Skipping..."
              MERGE_FAILURES=$((MERGE_FAILURES + 1))
              continue
            fi
            
            # Merge the PR
            if ! git merge --no-ff ${HEAD_REF} -m "Merge Dependabot PR #${PR_NUMBER}: ${PR_TITLE}"; then
              echo "✗ Failed to merge PR #${PR_NUMBER}. Aborting merge..."
              git merge --abort
              MERGE_FAILURES=$((MERGE_FAILURES + 1))
              git branch -d ${HEAD_REF} 2>/dev/null || true
              continue
            fi
            
            # Push changes
            if ! git push origin dependabot; then
              echo "✗ Failed to push after merging PR #${PR_NUMBER}. Aborting..."
              git reset --hard HEAD~1
              MERGE_FAILURES=$((MERGE_FAILURES + 1))
              git branch -d ${HEAD_REF} 2>/dev/null || true
              continue
            fi
            
            # Close the PR
            if gh pr close ${PR_NUMBER}; then
              echo "✓ Successfully merged and closed PR #${PR_NUMBER}"
              MERGE_SUCCESS=$((MERGE_SUCCESS + 1))
            else
              echo "⚠ Merged PR #${PR_NUMBER} but failed to close it"
            fi
            
            # Clean up the local branch
            git branch -d ${HEAD_REF} 2>/dev/null || true
          done < "$TEMP_FILE"
          
          rm -f "$TEMP_FILE"
          
          echo ""
          echo "Summary: ${MERGE_SUCCESS} merged successfully, ${MERGE_FAILURES} failed"
          
          if [ "$MERGE_FAILURES" -gt 0 ]; then
            echo "⚠ Failed to merge $MERGE_FAILURES PR(s)"
            exit 1
          else
            echo "✓ Successfully processed all Dependabot PRs"
          fi
